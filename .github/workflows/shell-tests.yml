name: Shell Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure shellcheck is available
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi
          shellcheck --version

      - name: Run syntax checks and unit tests
        run: bash test/run_ci_checks.sh

  docker-smoke:
    runs-on: ubuntu-latest
    needs: shell-tests
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Docker integration smoke test
        run: bash test/run_integration_checks.sh
